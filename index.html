  <figure class="art">
    <!-- Cubist "Creation" — a hand reaching toward the machine. Inlined so the
         continuous motion (hand drifts toward the screen, contact spark throbs)
         runs reliably. Source of truth mirrored in assets/cubist-hero.svg. -->
    <svg class="hero-art" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img"
         aria-label="A cubist illustration: a fragmented laptop with an angular hand reaching in from the right, fingertip nearly touching a bright spark on the screen — a modernist echo of the Creation of Adam.">
      <defs>
        <style>
          .e { stroke:#1c1a17; stroke-width:5; stroke-linejoin:round; stroke-linecap:round; }
          .m { stroke:#1c1a17; stroke-width:3; stroke-linejoin:round; stroke-linecap:round; }
          .t { stroke:#1c1a17; stroke-width:2; stroke-linejoin:round; }

          /* One 9s loop: reach in, tap three keys, withdraw, then the screen
             bursts with light. Reduced-motion falls back to a static scene
             (hand resting over the keys, no rays). */
          .hand-pos { transform: translate(-48px, 188px); }
          .hand { transform-box: fill-box; transform-origin: 96% 42%;
                  animation: sequence 9s ease-in-out infinite; }
          .spark { transform-box: fill-box; transform-origin: center;
                   animation: throb 2.4s ease-in-out infinite; }
          .keyA { animation: pressA 9s ease infinite; }
          .keyB { animation: pressB 9s ease infinite; }
          .keyC { animation: pressC 9s ease infinite; }
          .rays { transform-box: fill-box; transform-origin: center; opacity: 0;
                  animation: burst 9s ease-in-out infinite; }
          .flash { opacity: 0; animation: flash 9s ease-in-out infinite; }

          @keyframes sequence {
            0%   { transform: translateX(100%) translateY(-4%); }
            12%  { transform: translateX(0) translateY(0) rotate(0deg); }
            21%  { transform: translateX(0) translateY(5%) rotate(1.6deg); }
            25%  { transform: translateX(0) translateY(0) rotate(0deg); }
            29%  { transform: translateX(0) translateY(5%) rotate(1.6deg); }
            33%  { transform: translateX(0) translateY(0) rotate(0deg); }
            37%  { transform: translateX(0) translateY(5%) rotate(1.6deg); }
            41%  { transform: translateX(0) translateY(0) rotate(0deg); }
            46%  { transform: translateX(0) translateY(0); }
            57%  { transform: translateX(100%) translateY(-4%); }
            100% { transform: translateX(100%) translateY(-4%); }
          }
          @keyframes pressA { 0%,19% { fill:#f2ebd8; } 21% { fill:#e6c25f; } 25%,100% { fill:#f2ebd8; } }
          @keyframes pressB { 0%,27% { fill:#f2ebd8; } 29% { fill:#e6c25f; } 33%,100% { fill:#f2ebd8; } }
          @keyframes pressC { 0%,35% { fill:#f2ebd8; } 37% { fill:#e6c25f; } 41%,100% { fill:#f2ebd8; } }
          @keyframes throb { 0%,100% { transform: scale(1); opacity: 1; }
                             50% { transform: scale(1.16); opacity: 0.62; } }
          @keyframes burst {
            0%,53% { opacity: 0; transform: scale(0.12); }
            59%    { opacity: 1; transform: scale(0.85); }
            69%    { opacity: 1; transform: scale(1.3) rotate(8deg); }
            85%    { opacity: 0; transform: scale(1.9) rotate(18deg); }
            100%   { opacity: 0; transform: scale(0.12); }
          }
          @keyframes flash {
            0%,58% { opacity: 0; }
            64%    { opacity: 0.92; }
            72%    { opacity: 0.4; }
            84%    { opacity: 0; }
            100%   { opacity: 0; }
          }

          @media (prefers-reduced-motion: reduce) {
            .hand, .spark, .keyA, .keyB, .keyC, .rays, .flash { animation: none; }
            .rays, .flash { opacity: 0; }
          }
        </style>
        <filter id="grain" x="0" y="0" width="100%" height="100%">
          <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch" result="n"/>
          <feColorMatrix in="n" type="saturate" values="0"/>
        </filter>
        <radialGradient id="spark" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#f6efdb"/>
          <stop offset="45%" stop-color="#e6c25f"/>
          <stop offset="100%" stop-color="#e6c25f" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="bloom" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff8e6"/>
          <stop offset="38%" stop-color="#f4d98f" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#f4d98f" stop-opacity="0"/>
        </radialGradient>
      </defs>

           fanned fingers. .hand-pos parks it over the keyboard; .hand animates. -->

      <!-- screenprint grain -->

      <!-- screen-filling flash at the peak of the burst -->
